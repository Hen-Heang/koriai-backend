server:
  port: ${PORT:8080}

spring:
  application:
    name: koriai-backend
  servlet:
    multipart:
      # Profile image uploads are capped at 2 MB in UserController; give a small
      # headroom so the framework limit isn't hit before our own validation.
      max-file-size: 3MB
      max-request-size: 3MB
  datasource:
    url: ${DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/aitestdb}}
    username: ${DB_USERNAME:${DATABASE_USERNAME:${PGUSER:postgres}}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:${PGPASSWORD:123}}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}
    # Disabled because seed migrations (e.g. reading units) embed dollar-quoted
    # JSONB literals like `$json${...}` where the `$` + `{` forms `${`, which
    # Flyway otherwise tries to resolve as a placeholder and fails to parse.
    placeholder-replacement: false

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: https://api.openai.com/v1
  model: gpt-5-mini
  mock-enabled: ${OPENAI_MOCK_ENABLED:false}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.heang.koriaibackend.domain
  type-handlers-package: com.heang.koriaibackend.common.mybatis
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:replace-this-with-a-long-random-256-bit-secret}
  access-token-expiration-ms: 3600000

google:
  # Comma-separated list of accepted Google OAuth client IDs (token audiences).
  # Include the web client ID used by the frontend and, if reused, the Supabase Google client ID.
  client-ids: ${GOOGLE_CLIENT_IDS:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Absolute base URL of the frontend, used to build clickable links in push
# notifications (e.g. Telegram messages). Leave blank to send link-less messages.
app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:}

# Telegram bot push channel. The channel self-disables when the bot-token is blank.
#   bot-token: token from @BotFather
#   bot-username: the bot's @name (without @), used to build t.me deep links
#   webhook-secret: optional shared secret validated on the webhook header
telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}
  webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}

# Web Push (browser) VAPID keys. The channel self-disables when keys are blank.
# Generate once: npx web-push generate-vapid-keys
#   subject must be a mailto: or https: URL identifying the sender.
webpush:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:admin@koriai.app}

# Firebase Cloud Messaging (FCM) for phone push. The channel self-disables when
# credentials are blank. Set the entire service-account JSON (single line) in
# FIREBASE_CREDENTIALS (Firebase console -> Project settings -> Service accounts).
firebase:
  credentials: ${FIREBASE_CREDENTIALS:}
