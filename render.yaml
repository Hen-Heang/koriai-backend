# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the Spring Boot app from the existing Dockerfile.
# Database is hosted externally on Neon (see DEPLOY_NEON_RENDER.md).
services:
  - type: web
    name: koriai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore           # pick the region closest to your Neon project
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # --- Neon Postgres (set these in the Render dashboard) ---
      # Use the JDBC form, e.g.:
      # jdbc:postgresql://ep-xxx-pooler.<region>.aws.neon.tech/<db>?sslmode=require
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # --- App secrets ---
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true       # Render generates a strong random value
      - key: CORS_ALLOWED_ORIGINS
        sync: false               # e.g. https://your-frontend.vercel.app

      # --- Flyway baseline (only needed if the Neon DB already has tables) ---
      - key: SPRING_FLYWAY_BASELINE_ON_MIGRATE
        value: "false"